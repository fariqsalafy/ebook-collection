<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E Book SovianaCSP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f4f0;--surface:#fff;--border:#e5ddd4;--text:#1c1815;
  --text-sec:#7a726b;--text-ter:#b0a79f;
  --primary:#4f46e5;--primary-light:#eef2ff;--primary-soft:#e8e4ff;
  --shadow:0 1px 4px rgba(0,0,0,.06);--shadow-lift:0 4px 20px rgba(0,0,0,.1);
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --trans:.25s cubic-bezier(.4,0,.2,1)
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}

/* ─── HEADER ─── */
header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.hdr{max-width:1280px;margin:0 auto;padding:.7rem 1.25rem}
.hdr-top{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:.55rem;text-decoration:none;color:inherit;flex-shrink:0}
.brand-ico{width:34px;height:34px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem;color:#fff;flex-shrink:0}
.brand h1{font-size:.92rem;font-weight:700;line-height:1.2}
.brand small{font-size:.62rem;color:var(--text-sec);display:block}
.srch{flex:1;min-width:140px;position:relative}
.srch input{width:100%;padding:.4rem .85rem .4rem 2rem;border:1.5px solid var(--border);border-radius:999px;background:var(--surface);color:var(--text);font-size:.78rem;font-family:var(--font);outline:none;transition:border var(--trans)}
.srch input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.srch .ico{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--text-ter);pointer-events:none;font-size:.75rem}
.stat{font-size:.7rem;color:var(--text-ter);white-space:nowrap}
.stat strong{color:var(--text);font-weight:600}

/* ─── CATEGORY PILLS ─── */
.hdr-cats{margin-top:.45rem;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;display:flex;gap:.25rem}
.hdr-cats::-webkit-scrollbar{display:none}
.cat{padding:.18rem .65rem;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--text-sec);font-size:.67rem;font-family:var(--font);font-weight:500;cursor:pointer;transition:all var(--trans);white-space:nowrap;flex-shrink:0}
.cat:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.cat.on{background:var(--primary);border-color:var(--primary);color:#fff}

/* ─── MAIN CONTENT ─── */
main{max-width:1280px;margin:0 auto;padding:1.25rem}

/* ─── CATEGORY SECTION (shelf) ─── */
.sec{margin-bottom:1.6rem}
.sec-hd{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.6rem}
.sec-hd h2{font-size:.95rem;font-weight:700;color:var(--text);letter-spacing:-.01em}
.sec-hd span{font-size:.68rem;color:var(--text-ter);font-weight:500}
.sh-wrap{position:relative;display:flex;align-items:center}
.sh{display:flex;gap:.65rem;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none;-webkit-overflow-scrolling:touch;width:100%;padding:2px 0}
.sh::-webkit-scrollbar{display:none}
.sh .bk{flex:0 0 calc(20% - 0.52rem);min-width:130px}
.sa{position:absolute;z-index:2;width:34px;height:34px;border-radius:50%;border:none;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;color:var(--text);transition:all var(--trans);flex-shrink:0;opacity:0}
.sh-wrap:hover .sa,.sa.shown{opacity:1}
.sa:hover{box-shadow:0 4px 16px rgba(0,0,0,.16)}
.sa:disabled{opacity:0!important;pointer-events:none}
.sa.sl{left:-14px}.sa.sr{right:-14px}

/* ─── BOOK CARD ─── */
.bk{cursor:pointer;transition:transform var(--trans);position:relative}
.bk:hover{transform:translateY(-3px)}
.bk-cvr{width:100%;aspect-ratio:3/4;border-radius:var(--radius-sm);overflow:hidden;background:linear-gradient(145deg,#ece8e0,#e0dad0);margin-bottom:.35rem;box-shadow:var(--shadow);position:relative;transition:box-shadow var(--trans)}
.bk:hover .bk-cvr{box-shadow:var(--shadow-lift)}
.bk-cvr img{width:100%;height:100%;object-fit:cover;display:block}
.bk-cvr img.error{display:none}
.bk-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#ece8e0,#e0dad0)}
.bk-fb svg{width:28px;height:28px;opacity:.35}
.bk-ttl{font-size:.65rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text)}
.bk-sub{font-size:.57rem;color:var(--text-ter);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ─── SEARCH MODE ─── */
#resView{display:none}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:3rem 1rem;color:var(--text-ter)}
.empty i{font-size:2rem;display:block;margin-bottom:.4rem}
.empty p{font-size:.8rem}

/* ─── DETAIL OVERLAY ─── */
.detail{position:fixed;inset:0;z-index:150;display:flex;opacity:0;pointer-events:none;transition:opacity .35s ease}
.detail.open{opacity:1;pointer-events:auto}
.detail-bg{position:absolute;inset:0;background:rgba(12,10,8,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.detail-box{position:relative;z-index:2;margin:auto;width:min(95vw,480px);max-height:90vh;overflow-y:auto;background:var(--surface);border-radius:var(--radius-lg);box-shadow:0 25px 80px rgba(0,0,0,.25);animation:slideUp .4s cubic-bezier(.22,1,.36,1) forwards}
@keyframes slideUp{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}

/* close */
.detail-cl{position:absolute;top:12px;right:12px;z-index:3;width:30px;height:30px;border:none;border-radius:50%;background:rgba(0,0,0,.05);color:var(--text-ter);cursor:pointer;display:grid;place-items:center;font-size:.8rem;transition:all var(--trans)}
.detail-cl:hover{background:rgba(239,68,68,.12);color:#ef4444;transform:scale(1.05)}

/* cover + info */
.detail-top{padding:1.5rem 1.5rem 0;display:flex;gap:1rem}
.detail-cvr{width:110px;flex-shrink:0;border-radius:var(--radius-sm);overflow:hidden;background:linear-gradient(145deg,#ece8e0,#e0dad0);box-shadow:0 4px 16px rgba(0,0,0,.1);aspect-ratio:3/4;position:relative}
.detail-cvr img{width:100%;height:100%;object-fit:cover;display:block}
.detail-cvr img.error{display:none}
.detail-cvr .fb{position:absolute;inset:0;display:none;place-items:center;background:linear-gradient(145deg,#ece8e0,#e0dad0);color:var(--text-ter)}
.detail-cvr img.error~.fb{display:grid}
.detail-cvr .fb svg{width:28px;height:28px;opacity:.4}

.detail-info{flex:1;min-width:0;padding-top:.1rem}
.detail-info h2{font-size:1.05rem;font-weight:700;line-height:1.35;color:var(--text);margin-bottom:.2rem}
.detail-info .au{font-size:.75rem;color:var(--text-sec);margin-bottom:.35rem}
.detail-info .au em{font-style:normal;color:var(--text);font-weight:500}
.detail-tags{display:flex;flex-wrap:wrap;gap:.25rem}
.detail-tags span{font-size:.58rem;padding:.1rem .5rem;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-weight:500;letter-spacing:.01em}

/* body */
.detail-body{padding:1rem 1.5rem 1.5rem}
.detail-body p{font-size:.78rem;color:var(--text-sec);line-height:1.7;margin-bottom:1.1rem}
.detail-body p:empty{display:none}

.detail-btn{display:flex;gap:.5rem;align-items:center;justify-content:center;width:100%;padding:.75rem;border:none;border-radius:var(--radius-sm);background:var(--primary);color:#fff;font-size:.82rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all var(--trans)}
.detail-btn:hover{background:#4338ca;transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.35)}
.detail-btn:active{transform:none}
.detail-btn svg{width:18px;height:18px}

/* ─── READER ─── */
.reader{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s}
.reader.open{opacity:1;pointer-events:auto}
.reader-bg{position:absolute;inset:0;background:rgba(10,8,6,.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.reader-hd{position:relative;z-index:2;display:flex;align-items:center;gap:.5rem;padding:.45rem .65rem;background:var(--surface);flex-shrink:0}
.reader-hd .cl{width:28px;height:28px;border:none;border-radius:50%;background:var(--bg);color:var(--text-sec);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--trans);flex-shrink:0;font-size:.85rem}
.reader-hd .cl:hover{background:#fee2e2;color:#ef4444}
.reader-hd .rt{flex:1;font-size:.78rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;color:var(--text)}
.reader-bd{position:relative;z-index:2;flex:1;display:flex;overflow:hidden;background:#e8e4df}
.reader-bd iframe{width:100%;border:none;background:#fff;display:none;transform:translateY(-52px);height:calc(100% + 52px);flex-shrink:0}
.reader-bd .load{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.65rem;background:var(--surface)}
.reader-bd .load img{width:130px;aspect-ratio:3/4;border-radius:6px;object-fit:cover;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:floatIn .5s ease forwards}
@keyframes floatIn{0%{transform:translateY(10px) scale(.95);opacity:0}100%{transform:none;opacity:1}}
.reader-bd .load .sp{width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:sp .7s linear infinite}
.reader-bd .load span{font-size:.75rem;color:var(--text-ter)}
@keyframes sp{to{transform:rotate(360deg)}}

/* ─── RESPONSIVE ─── */
@media(max-width:800px){
  .sh .bk{flex:0 0 calc(33.33% - 0.52rem);min-width:120px}
  .detail-cvr{width:95px}
}
@media(max-width:480px){
  .hdr{padding:.5rem .7rem}.hdr-top{gap:.4rem}.brand h1{font-size:.8rem}.brand small{font-size:.55rem}.brand-ico{width:30px;height:30px;font-size:.85rem}
  .stat{font-size:.6rem}.srch input{font-size:.72rem}
  .sh .bk{flex:0 0 calc(50% - 0.52rem);min-width:90px}
  .bk-ttl{font-size:.58rem}.bk-sub{font-size:.5rem}
  .sa{width:28px;height:28px;font-size:.65rem}.sa.sl{left:-10px}.sa.sr{right:-10px}
  .detail-top{flex-direction:column;align-items:center;text-align:center;padding:1.25rem 1rem 0}
  .detail-cvr{width:120px}.detail-body{padding:.75rem 1rem 1.25rem}.detail-cl{top:8px;right:8px}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="hdr-top">
      <a class="brand" href="#">
        <div class="brand-ico">📖</div>
        <div><h1>SovianaCSP</h1><small>Koleksi Ebook Digital</small></div>
      </a>
      <div class="srch"><span class="ico">🔍</span><input type="text" id="q" placeholder="Cari ebook..." autocomplete="off" oninput="onSearch()"></div>
      <div class="stat"><strong id="seen">0</strong> / <span id="all">0</span></div>
    </div>
    <div class="hdr-cats" id="cats"></div>
  </div>
</header>

<main id="main">
  <div id="secs"></div>
  <div id="resView"></div>
</main>

<!-- Detail Overlay -->
<div class="detail" id="detail">
  <div class="detail-bg" onclick="closeD()"></div>
  <div class="detail-box">
    <button class="detail-cl" onclick="closeD()">✕</button>
    <div class="detail-top">
      <div class="detail-cvr">
        <img id="dC" src="" alt="cover" referrerpolicy="no-referrer" onerror="this.classList.add('error')">
        <div class="fb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5A2.5 2.5 0 0 1 4 19.5Z"/><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/></svg></div>
      </div>
      <div class="detail-info">
        <h2 id="dT">-</h2>
        <div class="au" id="dA" style="display:none">oleh <em id="dAN"></em></div>
        <div class="detail-tags" id="dTags"></div>
      </div>
    </div>
    <div class="detail-body">
      <p id="dDesc"></p>
      <button class="detail-btn" onclick="openReader()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Baca Buku
      </button>
    </div>
  </div>
</div>

<!-- Reader -->
<div class="reader" id="reader">
  <div class="reader-bg" onclick="closeR()"></div>
  <div class="reader-hd"><button class="cl" onclick="closeR()">✕</button><span class="rt" id="rT">Memuat...</span></div>
  <div class="reader-bd">
    <div class="load" id="rL">
      <img id="rC" src="" alt="cover" referrerpolicy="no-referrer">
      <div class="sp"></div>
      <span>Memuat ebook...</span>
    </div>
    <iframe id="rF" allow="autoplay" allowfullscreen></iframe>
  </div>
</div>

<script>
let all=[],order=[],curBook=null,searchMode=false;

fetch('books.json').then(r=>r.json()).then(d=>{
  all=d.books;
  document.getElementById('all').textContent=d.total;
  const cm={};all.forEach(b=>b.categories.forEach(c=>cm[c]=(cm[c]||0)+1));
  order=Object.entries(cm).filter(([c])=>c!=='Umum').sort((a,b)=>b[1]-a[1]).map(([c])=>c);
  if(cm['Umum'])order.push('Umum');
  buildCats();buildSecs();
});

function buildCats(){
  const el=document.getElementById('cats');
  const a=document.createElement('button');a.className='cat on';a.textContent='Semua';a.onclick=()=>{document.querySelectorAll('.cat').forEach(b=>b.classList.toggle('on',b===a));showAll()};el.appendChild(a);
  order.forEach(c=>{
    const n=all.filter(b=>b.categories.includes(c)).length;
    const b=document.createElement('button');b.className='cat';b.textContent=c+' '+n;
    b.onclick=()=>{document.querySelectorAll('.cat').forEach(x=>x.classList.toggle('on',x===b));filterCat(c)};el.appendChild(b);
  });
}

function buildSecs(){
  const el=document.getElementById('secs');
  el.innerHTML=order.map(c=>{
    const books=all.filter(b=>b.categories.includes(c));
    const cards=books.map(b=>card(b)).join('');
    const few=books.length<=5;
    return `<div class="sec"><div class="sec-hd"><h2>📚 ${esc(c)}</h2><span>${books.length}</span></div><div class="sh-wrap"><button class="sa sl" onclick="scrollS(this,-1)"${few?' disabled':''}>◀</button><div class="sh">${cards}</div><button class="sa sr" onclick="scrollS(this,1)"${few?' disabled':''}>▶</button></div></div>`;
  }).join('');
  document.getElementById('seen').textContent=all.length;
}

function card(b){
  return `<div class="bk" data-id="${b.id}" onclick="openD(this)">
    <div class="bk-cvr">
      <img src="${esc(b.thumb)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none';this.parentElement.querySelector('.bk-fb').style.display='flex'">
      <div class="bk-fb" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5A2.5 2.5 0 0 1 4 19.5Z"/><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/></svg></div>
    </div>
    <div class="bk-ttl">${esc(b.name)}</div>
    <div class="bk-sub">${b.author||''}</div>
  </div>`;
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* ─── SHELF SCROLL ─── */
function scrollS(btn,dir){
  const sh=btn.closest('.sh-wrap').querySelector('.sh');
  const card=sh.querySelector('.bk');if(!card)return;
  const gap=parseFloat(getComputedStyle(sh).gap)||10;
  sh.scrollBy({left:dir*(card.offsetWidth+gap)*5,behavior:'smooth'});
}

/* ─── DETAIL OVERLAY ─── */
function openD(el){
  const b=all.find(x=>x.id===el.dataset.id);
  curBook=b;
  document.getElementById('dT').textContent=b.name;
  document.getElementById('dC').src=b.thumb;
  const aEl=document.getElementById('dA'),aN=document.getElementById('dAN');
  if(b.author){aEl.style.display='block';aN.textContent=b.author}else{aEl.style.display='none'}
  const tags=document.getElementById('dTags');
  tags.innerHTML=b.categories.map(c=>`<span>${esc(c)}</span>`).join('');
  document.getElementById('dDesc').textContent=b.desc||'';
  document.getElementById('detail').classList.add('open');
}
function closeD(){
  document.getElementById('detail').classList.remove('open');
}
function openReader(){
  closeD();
  const b=curBook;if(!b)return;
  document.getElementById('rT').textContent=b.name;
  document.getElementById('rC').src=b.thumb;
  const f=document.getElementById('rF'),l=document.getElementById('rL');
  f.src='';l.style.display='flex';f.style.display='none';
  document.getElementById('reader').classList.add('open');document.body.style.overflow='hidden';
  setTimeout(()=>{
    f.src=`https://drive.google.com/file/d/${b.id}/preview?embedded=true`;
    f.onload=()=>{l.style.display='none';f.style.display='block';l.querySelector('img').src=''};
    f.onerror=()=>{l.style.display='none';f.style.display='block'};
  },400);
}
function closeR(){
  document.getElementById('reader').classList.remove('open');document.body.style.overflow='';
  setTimeout(()=>{document.getElementById('rF').src=''},350);
}

/* ─── SEARCH & FILTER ─── */
function onSearch(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  if(!q.length){showAll();return}
  searchMode=true;
  document.getElementById('secs').style.display='none';
  document.getElementById('resView').style.display='block';
  const res=all.filter(b=>b.name.toLowerCase().includes(q));
  document.getElementById('seen').textContent=res.length;
  const cards=res.map(b=>card(b)).join('');
  document.getElementById('resView').innerHTML=res.length
    ? `<div class="sec"><div class="sec-hd"><h2>🔍 Hasil</h2><span>${res.length}</span></div><div class="sh-wrap"><button class="sa sl" onclick="scrollS(this,-1)">◀</button><div class="sh">${cards}</div><button class="sa sr" onclick="scrollS(this,1)">▶</button></div></div>`
    : '<div class="empty"><i>📭</i><p>Tidak ditemukan.</p></div>';
}
function showAll(){
  searchMode=false;
  document.querySelectorAll('.cat').forEach(b=>b.classList.toggle('on',b.textContent.startsWith('Semua')));
  document.getElementById('q').value='';
  document.getElementById('secs').style.display='block';
  document.getElementById('resView').style.display='none';
  document.getElementById('seen').textContent=all.length;
}
function filterCat(c){
  searchMode=true;
  document.getElementById('secs').style.display='none';
  document.getElementById('resView').style.display='block';
  document.getElementById('q').value='';
  const res=all.filter(b=>b.categories.includes(c));
  document.getElementById('seen').textContent=res.length;
  const cards=res.map(b=>card(b)).join('');
  document.getElementById('resView').innerHTML=`<div class="sec"><div class="sec-hd"><h2>📚 ${esc(c)}</h2><span>${res.length}</span></div><div class="sh-wrap"><button class="sa sl" onclick="scrollS(this,-1)">◀</button><div class="sh">${cards}</div><button class="sa sr" onclick="scrollS(this,1)">▶</button></div></div>`;
}

/* ─── KEYBOARD ─── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){const d=document.getElementById('detail');if(d.classList.contains('open'))closeD();else closeR()}
});
</script>
</body>
</html>
